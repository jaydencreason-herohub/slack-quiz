<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herohub Slack Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #008080;
    --teal-dark: #005f5f;
    --teal-light: #00b3b3;
    --teal-pale: #e0f4f4;
    --teal-mid: #d0f0f0;
    --bg: #f5fafa;
    --white: #ffffff;
    --text: #1a2e2e;
    --muted: #5a7575;
    --correct: #1a7a4a;
    --correct-bg: #eaf7f0;
    --wrong: #b83232;
    --wrong-bg: #fdf0f0;
    --border: #c5e0e0;
    --shadow: 0 4px 24px rgba(0,128,128,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Background decoration */
  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 480px; height: 480px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,179,179,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -80px; left: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,128,128,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .quiz-header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .badge {
    display: inline-block;
    background: var(--teal);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .quiz-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    color: var(--teal-dark);
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .quiz-header h1 span {
    color: var(--teal-light);
  }

  .quiz-header p {
    color: var(--muted);
    font-size: 16px;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Progress */
  .progress-wrap {
    margin-bottom: 32px;
    animation: fadeUp 0.5s 0.2s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--teal-dark);
    letter-spacing: 0.5px;
  }

  .progress-score {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--teal);
  }

  .progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* Question card */
  .question-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    animation: fadeUp 0.4s ease both;
  }

  .question-num {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 12px;
  }

  .question-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 28px;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    cursor: pointer;
    transition: all 0.18s ease;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    text-align: left;
  }

  .option:hover:not(.disabled) {
    border-color: var(--teal);
    background: var(--teal-pale);
    transform: translateX(4px);
    box-shadow: 0 2px 12px rgba(0,128,128,0.10);
  }

  .option.disabled { cursor: default; }

  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
    font-weight: 500;
  }

  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
    text-decoration: line-through;
    opacity: 0.85;
  }

  .option.reveal-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
    font-weight: 500;
  }

  .option-letter {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.18s ease;
  }

  .option.correct .option-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }

  .option.wrong .option-letter {
    background: var(--wrong);
    border-color: var(--wrong);
    color: white;
  }

  .option.reveal-correct .option-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }

  /* Feedback box */
  .feedback {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeUp 0.3s ease both;
  }

  .feedback.correct {
    background: var(--correct-bg);
    border: 1px solid #a3d9be;
    color: var(--correct);
    display: block;
  }

  .feedback.wrong {
    background: var(--wrong-bg);
    border: 1px solid #f0b8b8;
    color: var(--wrong);
    display: block;
  }

  .feedback strong { font-weight: 600; }

  /* Next button */
  .btn-next {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: none;
  }

  .btn-next:hover {
    background: var(--teal-dark);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,128,128,0.25);
  }

  .btn-next.show { display: block; animation: fadeUp 0.3s ease both; }

  /* Results */
  .results {
    background: white;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 36px;
    text-align: center;
    box-shadow: var(--shadow);
    animation: fadeUp 0.5s ease both;
    display: none;
  }

  .results.show { display: block; }

  .results-icon {
    font-size: 56px;
    margin-bottom: 20px;
  }

  .results h2 {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--teal-dark);
    margin-bottom: 10px;
  }

  .results-score {
    font-family: 'Syne', sans-serif;
    font-size: 4rem;
    font-weight: 800;
    color: var(--teal);
    line-height: 1;
    margin: 20px 0 8px;
  }

  .results-label {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .results-msg {
    font-size: 16px;
    color: var(--text);
    line-height: 1.6;
    max-width: 440px;
    margin: 0 auto 36px;
  }

  .results-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin: 0 auto 36px;
    max-width: 420px;
  }

  .breakdown-item {
    background: var(--teal-pale);
    border-radius: 12px;
    padding: 16px 8px;
  }

  .breakdown-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--teal-dark);
  }

  .breakdown-lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .btn-restart {
    padding: 16px 40px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }

  .btn-restart:hover {
    background: var(--teal-dark);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,128,128,0.25);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="quiz-header">
    <div class="badge">Herohub Training</div>
    <h1>Slack <span>Etiquette</span> Quiz</h1>
    <p>Test your knowledge of Herohub's Slack guidelines. 10 questions — let's see how ready you are.</p>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span class="progress-label" id="progressLabel">Question 1 of 10</span>
      <span class="progress-score" id="progressScore">Score: 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div id="quizArea">
    <div class="question-card" id="questionCard">
      <div class="question-num" id="questionNum">Question 1</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsArea"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <div class="results" id="resultsPanel">
    <div class="results-icon" id="resultsIcon"></div>
    <h2 id="resultsTitle"></h2>
    <div class="results-score" id="resultsScore"></div>
    <div class="results-label">out of 10 correct</div>
    <div class="results-breakdown">
      <div class="breakdown-item">
        <div class="breakdown-num" id="bdCorrect">0</div>
        <div class="breakdown-lbl">Correct</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-num" id="bdWrong">0</div>
        <div class="breakdown-lbl">Incorrect</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-num" id="bdPct">0%</div>
        <div class="breakdown-lbl">Score</div>
      </div>
    </div>
    <p class="results-msg" id="resultsMsg"></p>
    <button class="btn-restart" onclick="restart()">Try Again</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "Every morning, where should you post your check-in message?",
    options: ["In the #general channel", "In your team channel", "As a direct message to your manager", "In any product channel"],
    answer: 1,
    feedback: {
      correct: "✓ Correct! Your morning check-in — \"In office\" or \"Online\" — goes in your private team channel. It starts the thread you'll use all day.",
      wrong: "Your morning check-in goes in your team channel. It kicks off the thread that holds all your updates for the entire day."
    }
  },
  {
    q: "You need to step away for a doctor's appointment. What's the right thing to do?",
    options: ["Post a new message in your team channel saying you're away", "Reply in your morning check-in thread with your away message", "Send a DM to your manager only", "Do nothing — Slack status will show you're away"],
    answer: 1,
    feedback: {
      correct: "✓ Exactly! Reply in your morning check-in thread with something like \"Appointment – back at 3\". Do NOT start a new thread.",
      wrong: "When stepping away, always reply in your morning check-in thread. Never start a new thread for step-away updates."
    }
  },
  {
    q: "What three types of channels does Herohub use?",
    options: ["Public, Private, and Secret", "Team, Product, and Project", "Announcements, General, and DMs", "Sales, Marketing, and Operations"],
    answer: 1,
    feedback: {
      correct: "✓ Right! Team Channels (private), Product Channels (public), and Project Channels (private/OEM deals).",
      wrong: "Herohub uses three channel types: Team Channels (private), Product Channels (public), and Project Channels (private for active projects and OEM deals)."
    }
  },
  {
    q: "Which type of channel is PUBLIC and visible to everyone in the workspace?",
    options: ["Team Channels", "Project Channels", "Product Channels", "Manager Channels"],
    answer: 2,
    feedback: {
      correct: "✓ Correct! Product Channels are public. They serve as a product knowledge hub that everyone can access.",
      wrong: "Product Channels are public. They're designed to be a shared knowledge hub for the whole team. Team and Project channels are private."
    }
  },
  {
    q: "You want to reply to someone's message in a channel. What should you do?",
    options: ["Type your reply directly in the main channel", "Send them a DM instead", "Reply in the thread under their message", "React with an emoji only"],
    answer: 2,
    feedback: {
      correct: "✓ Threads are mandatory! All replies go in the thread to keep the main channel clean and scannable.",
      wrong: "All replies must go in the thread under the original message. Never reply in the main channel — threads are mandatory at Herohub."
    }
  },
  {
    q: "A salesperson is posting their end-of-day summary. Which metric does NOT need to be included?",
    options: ["Connections", "Proposals", "Email open rate", "Closed Won"],
    answer: 2,
    feedback: {
      correct: "✓ Correct! The required daily sales metrics are: Connections, Sets, Meetings, Proposals, and Closed Won. Email open rate is not part of the daily report.",
      wrong: "The required end-of-day sales metrics are: Connections, Sets, Meetings, Proposals, and Closed Won. Email open rate is not one of them."
    }
  },
  {
    q: "You notice that some useful product information is missing from a product channel. What's the right way to post a question?",
    options: ["Write a detailed paragraph explaining the full situation in the main channel", "DM the person who would know the answer", "Post a short subject-line message and put details in the thread", "Create a new channel for that product topic"],
    answer: 2,
    feedback: {
      correct: "✓ Perfect! Use a short subject-line format in the main channel (like \"❓ Herohub20 Pricing\"), then put all details and responses in the thread.",
      wrong: "In product channels, the main message should be a clear subject-line headline only. All details and replies go in the thread. This keeps the channel scannable."
    }
  },
  {
    q: "You think a new Slack channel would be helpful for a project you're working on. What do you do?",
    options: ["Create the channel and invite relevant teammates right away", "Talk to your manager before creating any new channel", "Post in #general asking if others want the channel", "Create it as a private channel so no one else sees it"],
    answer: 1,
    feedback: {
      correct: "✓ That's right! Never create channels on your own. If you think one is needed, always speak with your manager first.",
      wrong: "You should never create new Slack channels without approval. Always talk to your manager first — they'll decide if a new channel is appropriate."
    }
  },
  {
    q: "What should you do when you return to work after stepping away?",
    options: ["Post a new check-in message in the team channel", "Reply \"Back\" in your original morning check-in thread", "Update your Slack status to green", "Send a DM to your team letting them know you're back"],
    answer: 1,
    feedback: {
      correct: "✓ Right! Reply \"Back\" in your same morning thread. All day-long updates — including returning — stay in that single thread.",
      wrong: "When you return, reply \"Back\" in your original morning check-in thread. Everything from check-in to check-out lives in that same thread."
    }
  },
  {
    q: "Which of these is listed as something Herohub is eliminating with the new Slack guidelines?",
    options: ["Quick emoji reactions", "Using threads for replies", "Long distracting messages", "Daily check-ins"],
    answer: 2,
    feedback: {
      correct: "✓ Correct! Herohub is actively working to eliminate: lost information, confusion, unclear communication, and long distracting messages.",
      wrong: "Herohub's Slack overhaul specifically targets: lost information, confusion, unclear communication, and long distracting messages in channels."
    }
  }
];

let current = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

// Shuffle questions once
const shuffled = shuffle(questions);

function render() {
  const q = shuffled[current];
  document.getElementById('questionNum').textContent = `Question ${current + 1}`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('progressLabel').textContent = `Question ${current + 1} of 10`;
  document.getElementById('progressScore').textContent = `Score: ${score}`;
  document.getElementById('progressBar').style.width = `${(current / 10) * 100}%`;

  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    area.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btnNext').className = 'btn-next';
  answered = false;

  // Animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.35s ease both';
}

function selectAnswer(i) {
  if (answered) return;
  answered = true;

  const q = shuffled[current];
  const options = document.querySelectorAll('.option');
  options.forEach(o => o.classList.add('disabled'));

  const fb = document.getElementById('feedback');
  const isCorrect = i === q.answer;

  if (isCorrect) {
    options[i].classList.add('correct');
    score++;
    fb.className = 'feedback correct';
    fb.innerHTML = `<strong>Correct!</strong> ${q.feedback.correct.replace('✓ Correct! ','').replace('✓ Exactly! ','').replace('✓ Right! ','').replace('✓ Perfect! ','').replace('✓ That\'s right! ','')}`;
  } else {
    options[i].classList.add('wrong');
    options[q.answer].classList.add('reveal-correct');
    fb.className = 'feedback wrong';
    fb.innerHTML = `<strong>Not quite.</strong> ${q.feedback.wrong}`;
  }

  document.getElementById('progressScore').textContent = `Score: ${score}`;

  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = current < 9 ? 'Next Question →' : 'See Results →';
  btnNext.className = 'btn-next show';
}

function nextQuestion() {
  current++;
  if (current >= 10) {
    showResults();
  } else {
    render();
  }
}

function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';

  const pct = Math.round((score / 10) * 100);
  const panel = document.getElementById('resultsPanel');

  let icon, title, msg;
  if (score === 10) {
    icon = '🏆'; title = 'Perfect Score!';
    msg = 'Outstanding! You have a complete command of Herohub\'s Slack guidelines. You\'re ready to communicate like a pro from day one.';
  } else if (score >= 8) {
    icon = '🌟'; title = 'Great Work!';
    msg = 'You clearly understand how we use Slack at Herohub. Review any questions you missed and you\'ll be all set.';
  } else if (score >= 6) {
    icon = '👍'; title = 'Good Effort!';
    msg = 'A solid foundation! We recommend re-reading the Slack Etiquette Guide, especially the sections on check-in procedures and channel types.';
  } else {
    icon = '📖'; title = 'Keep Practicing!';
    msg = 'No worries — this is what training is for! Take another look at the Slack Etiquette Guide and try again. You\'ll get there!';
  }

  document.getElementById('resultsIcon').textContent = icon;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsScore').textContent = score;
  document.getElementById('resultsMsg').textContent = msg;
  document.getElementById('bdCorrect').textContent = score;
  document.getElementById('bdWrong').textContent = 10 - score;
  document.getElementById('bdPct').textContent = pct + '%';

  panel.className = 'results show';
}

function restart() {
  current = 0;
  score = 0;
  answered = false;
  // Re-shuffle
  shuffled.sort(() => Math.random() - 0.5);
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('resultsPanel').className = 'results';
  render();
}

render();
</script>
</body>
</html>
